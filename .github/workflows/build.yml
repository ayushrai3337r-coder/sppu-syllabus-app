name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b 3.24.0
          echo "$PWD/flutter/bin" >> $GITHUB_PATH
      - name: Create Flutter project
        run: |
          flutter create temp_app --platforms android
          cp -r temp_app/android ./android_complete
          rm -rf android
          mv android_complete android
          cp lib/main.dart temp_app/lib/main.dart
          cp pubspec.yaml temp_app/pubspec.yaml
      - name: Build APK
        working-directory: temp_app
        run: |
          flutter pub get
          flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: temp_app/build/app/outputs/apk/release/app-release.apk
