name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0'
      - name: Create Flutter project
        run: |
          flutter create temp_app --platforms android
          cp lib/main.dart temp_app/lib/main.dart
          cp pubspec.yaml temp_app/pubspec.yaml
      - name: Build APK
        working-directory: temp_app
        run: |
          flutter pub get
          flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: temp_app/build/app/outputs/apk/release/app-release.apk
